[mod-setting-name]
flma-export-enabled=Enable live data export
flma-tick-interval=Export tick interval
flma-export-inventories=Export player inventories
flma-export-buildings=Export placed buildings
flma-buildings-compact-threshold=Buildings log compaction threshold

[mod-setting-description]
flma-export-enabled=Master switch. When off, no event handlers are registered and the mod has zero per-tick cost. Synced across all peers.
flma-tick-interval=Ticks between production/logistics/inventory snapshot exports (60 UPS = 60 ticks/sec). Lower values cost more.
flma-export-inventories=Also export connected players' main inventory contents. Off by default since this is more sensitive than aggregate stats.
flma-export-buildings=Maintain an incremental index of placed buildings. Enabling this triggers a one-time chunked baseline scan of existing entities.
flma-buildings-compact-threshold=Number of lines appended to buildings.ndjson before the mod rewrites it as a compacted snapshot.
